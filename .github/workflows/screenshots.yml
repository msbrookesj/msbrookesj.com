name: Page Screenshots

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  screenshots:
    name: Capture Page Screenshots
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run screenshots

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: page-screenshots
          path: screenshots/
          retention-days: 90

      # PRs: push to screenshots/pr-<N>-<sha> and add a link to the PR
      # description.  The commit hash in the branch name avoids race
      # conditions when multiple pushes to the same PR trigger concurrent
      # workflow runs — each run writes its own branch.
      # Skipped for PRs from forks (no write access to this repo).
      - name: Push screenshots for PR
        id: push-screenshots
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SHORT_SHA: ${{ github.sha }}
        run: |
          SHORT_SHA="${SHORT_SHA::7}"
          BRANCH="screenshots/pr-${PR_NUMBER}-${SHORT_SHA}"
          PREFIX="screenshots/pr-${PR_NUMBER}-"

          # Delete any stale "screenshots" ref that would block the
          # "screenshots/pr-*" namespace (directory/file conflict).
          gh api "repos/${{ github.repository }}/git/refs/heads/screenshots" \
            -X DELETE 2>/dev/null || true

          # Delete prior screenshot branches for this PR.
          gh api "repos/${{ github.repository }}/git/matching-refs/heads/${PREFIX}" \
            --jq '.[].ref' 2>/dev/null \
          | while read -r ref; do
              [ "$ref" = "refs/heads/${BRANCH}" ] && continue
              gh api "repos/${{ github.repository }}/git/${ref}" -X DELETE 2>/dev/null || true
            done

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan screenshots-tmp
          git rm -rf --cached . >/dev/null 2>&1 || true
          git add -f screenshots/
          git commit -m "Screenshots for PR #${PR_NUMBER} @ ${SHORT_SHA}"
          git push --force origin screenshots-tmp:"${BRANCH}"

      # Update PR description: append a screenshots link the first time,
      # or replace the existing one on subsequent pushes.
      - name: Update PR description
        if: github.event_name == 'pull_request' && steps.push-screenshots.outcome == 'success'
        shell: python
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          import subprocess, re, os

          pr_num = os.environ['PR_NUMBER']
          repo   = os.environ['REPO']
          sha    = os.environ['GITHUB_SHA'][:7]
          branch = f'screenshots/pr-{pr_num}-{sha}'
          url    = f'https://github.com/{repo}/tree/{branch}/screenshots'

          body = subprocess.check_output(
              ['gh', 'pr', 'view', pr_num, '--json', 'body', '--jq', '.body // ""'],
              text=True).strip()

          marker  = '<!-- screenshots-bot -->'
          section = (
              f'\n\n---\n{marker}\n'
              f'**Screenshots:** [View `{branch}` branch]({url}) — from `{sha}`'
          )

          if marker in body:
              body = re.sub(
                  r'\n\n---\n' + re.escape(marker) + r'.*$', '',
                  body, flags=re.DOTALL)

          with open('/tmp/pr_body.txt', 'w') as f:
              f.write(body + section)

          subprocess.run(
              ['gh', 'pr', 'edit', pr_num, '--body-file', '/tmp/pr_body.txt'],
              check=True)
