name: Page Screenshots

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

# Serialize per PR so description updates never race.
# Runs queue rather than cancel — every commit gets its screenshots.
concurrency:
  group: screenshots-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  screenshots:
    name: Capture Page Screenshots
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      # Mark this commit as in-progress in the PR description before
      # the slow screenshot capture begins.
      - name: Mark screenshots in-progress
        if: github.event_name == 'pull_request'
        shell: python
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          GITHUB_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          import json, re, subprocess, os

          pr_num  = os.environ['PR_NUMBER']
          repo    = os.environ['REPO']
          run_sha = os.environ['GITHUB_SHA']
          short   = run_sha[:7]

          def gh(*args):
              return subprocess.check_output(['gh'] + list(args) + ['-R', repo], text=True)

          pr_data = json.loads(gh('pr', 'view', pr_num, '--json', 'headRefOid,body'))
          head_sha = pr_data['headRefOid']
          body     = pr_data.get('body') or ''

          if run_sha != head_sha:
              print(f"Stale run ({short}) — PR HEAD is now {head_sha[:7]}. Skipping.")
              raise SystemExit(0)

          # Enumerate existing screenshot branches
          prefix = f"screenshots/pr-{pr_num}-"
          refs = json.loads(
              subprocess.check_output(
                  ['gh', 'api', f'repos/{repo}/git/matching-refs/heads/{prefix}'],
                  text=True))

          lines = ['| Commit | Screenshots |',
                   '| ------ | ----------- |']
          for r in refs:
              name = r['ref'].removeprefix('refs/heads/')
              sha  = name.rsplit('-', 1)[-1]
              url  = f'https://github.com/{repo}/tree/{name}/screenshots'
              lines.append(f'| `{sha}` | [View]({url}) |')

          # Append the in-progress row for the current commit
          lines.append(f'| **`{short}`** (HEAD) | :hourglass_flowing_sand: Capturing… |')

          table   = '\n'.join(lines)
          marker  = '<!-- screenshots-bot -->'
          section = f'\n\n---\n{marker}\n**Screenshots**\n\n{table}'

          if marker in body:
              body = re.sub(
                  r'\n\n---\n' + re.escape(marker) + r'.*$', '',
                  body, flags=re.DOTALL)

          with open('/tmp/pr_body.txt', 'w') as f:
              f.write(body + section)

          subprocess.run(
              ['gh', 'pr', 'edit', pr_num, '--body-file', '/tmp/pr_body.txt', '-R', repo],
              check=True)

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run screenshots

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: page-screenshots
          path: screenshots/
          retention-days: 90

      # PRs: push to screenshots/pr-<N>-<sha>.
      # Each commit gets its own branch so the full history is preserved.
      - name: Push screenshots for PR
        id: push-screenshots
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SHORT_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          SHORT_SHA="${SHORT_SHA::7}"
          BRANCH="screenshots/pr-${PR_NUMBER}-${SHORT_SHA}"

          # Delete any stale "screenshots" ref that would block the
          # "screenshots/pr-*" namespace (directory/file conflict).
          gh api "repos/${{ github.repository }}/git/refs/heads/screenshots" \
            -X DELETE 2>/dev/null || true

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan screenshots-tmp
          git rm -rf --cached . >/dev/null 2>&1 || true
          git add -f screenshots/
          git commit -m "Screenshots for PR #${PR_NUMBER} @ ${SHORT_SHA}"
          git push --force origin screenshots-tmp:"${BRANCH}"

      # Update PR description with a table of all screenshot branches.
      # Skipped if this run's commit is no longer the PR HEAD — a newer
      # run is queued (or already ran) and will write the final listing.
      - name: Update PR description
        if: github.event_name == 'pull_request' && steps.push-screenshots.outcome == 'success'
        shell: python
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          GITHUB_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          import json, re, subprocess, os

          pr_num  = os.environ['PR_NUMBER']
          repo    = os.environ['REPO']
          run_sha = os.environ['GITHUB_SHA']

          # Helper — all gh CLI calls need -R because the prior step
          # ran "git checkout --orphan" which breaks local repo detection.
          def gh(*args):
              return subprocess.check_output(['gh'] + list(args) + ['-R', repo], text=True)

          # ── Guard: skip if this commit is no longer HEAD ──
          pr_data  = json.loads(gh('pr', 'view', pr_num, '--json', 'headRefOid,body'))
          head_sha = pr_data['headRefOid']
          body     = pr_data.get('body') or ''

          if run_sha != head_sha:
              print(f"Stale run ({run_sha[:7]}) — PR HEAD is now {head_sha[:7]}. Skipping description update.")
              raise SystemExit(0)

          # ── Enumerate all screenshot branches for this PR ──
          prefix = f"screenshots/pr-{pr_num}-"
          refs = json.loads(
              subprocess.check_output(
                  ['gh', 'api', f'repos/{repo}/git/matching-refs/heads/{prefix}'],
                  text=True))

          branches = []
          for r in refs:
              name = r['ref'].removeprefix('refs/heads/')
              sha = name.rsplit('-', 1)[-1]
              url = f'https://github.com/{repo}/tree/{name}/screenshots'
              is_head = run_sha.startswith(sha)
              branches.append((sha, name, url, is_head))

          # ── Build the screenshots section ──
          lines = ['| Commit | Screenshots |',
                   '| ------ | ----------- |']
          for sha, name, url, is_head in branches:
              label = f'**`{sha}`** (HEAD)' if is_head else f'`{sha}`'
              lines.append(f'| {label} | [View]({url}) |')

          table   = '\n'.join(lines)
          marker  = '<!-- screenshots-bot -->'
          section = f'\n\n---\n{marker}\n**Screenshots**\n\n{table}'

          if marker in body:
              body = re.sub(
                  r'\n\n---\n' + re.escape(marker) + r'.*$', '',
                  body, flags=re.DOTALL)

          with open('/tmp/pr_body.txt', 'w') as f:
              f.write(body + section)

          subprocess.run(
              ['gh', 'pr', 'edit', pr_num, '--body-file', '/tmp/pr_body.txt', '-R', repo],
              check=True)
