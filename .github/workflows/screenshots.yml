name: Page Screenshots

on:
  push:
  pull_request:

jobs:
  screenshots:
    name: Capture Page Screenshots
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run screenshots
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: page-screenshots
          path: screenshots/
          retention-days: 90
      # Push screenshots to the `screenshots` branch so they are browsable
      # in the GitHub mobile app (Artifacts require the browser + auth).
      # Only runs on push events; PR runs from forks lack write permission.
      - name: Publish screenshots to branch
        if: github.event_name == 'push'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan screenshots-tmp
          git rm -rf --cached . > /dev/null 2>&1 || true
          git add screenshots/
          git commit -m "Screenshots from ${GITHUB_REF_NAME} @ ${GITHUB_SHA::7}"
          git push --force origin screenshots-tmp:screenshots
