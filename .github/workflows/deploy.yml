name: Deploy

on:
  push:
    branches:
      - main

jobs:
  test:
    name: HTML Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:html

  deploy:
    name: Deploy to GCS
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Sync files
        run: gsutil -m rsync -r -d website/ gs://b1ryan.com/

      - name: Upload with gzip encoding
        run: |
          gsutil -m cp -z "html,css,js" \
            website/404.html \
            website/about.html \
            website/academic.html \
            website/athlete.html \
            website/index.html \
            website/license.html \
            website/professional.html \
            gs://b1ryan.com/

      - name: Invalidate CDN cache
        run: gcloud compute url-maps invalidate-cdn-cache ryanfam18-com --global --path "/*"
