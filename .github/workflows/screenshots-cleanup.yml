name: Delete Screenshots Branch

on:
  pull_request:
    types: [closed]

jobs:
  cleanup:
    name: Delete screenshots/pr-${{ github.event.pull_request.number }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Delete branch
        run: |
          BRANCH="screenshots/pr-${{ github.event.pull_request.number }}"
          gh api "repos/${{ github.repository }}/git/refs/heads/${BRANCH}" \
            -X DELETE \
            && echo "Deleted ${BRANCH}" \
            || echo "Branch ${BRANCH} not found — nothing to delete"
